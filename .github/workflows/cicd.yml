name: CI-CD

# trigger
on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test --workspaces --if-present

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            ecosystem.config.cjs
            package.json
            package-lock.json
            tsconfig.base.json
            shared/dist/
            shared/package.json
            api/dist/
            api/package.json
            client/dist/
            client/package.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Copy files to VPS and restart PM2
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/"

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "cd $DEPLOY_PATH && npm ci --omit=dev && pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs"
